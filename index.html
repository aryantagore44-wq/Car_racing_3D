<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Car Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        #instructions { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="instructions">Use ARROW KEYS to drive the car!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Ground (Road)
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // 2. Load Car Model
        let car;
        const loader = new GLTFLoader();
        loader.load('scene.gltf', (gltf) => {
            car = gltf.scene;
            scene.add(car);
            car.scale.set(0.02, 0.02, 0.02); // Agar car bahut badi dikhe toh isse chota karein
            console.log("Car Loaded!");
        });

        // 3. Movement Logic
        const keys = { w: false, s: false, a: false, d: false };
        window.addEventListener('keydown', (e) => { 
            if(e.key === "ArrowUp") keys.w = true;
            if(e.key === "ArrowDown") keys.s = true;
            if(e.key === "ArrowLeft") keys.a = true;
            if(e.key === "ArrowRight") keys.d = true;
        });
        window.addEventListener('keyup', (e) => { 
            if(e.key === "ArrowUp") keys.w = false;
            if(e.key === "ArrowDown") keys.s = false;
            if(e.key === "ArrowLeft") keys.a = false;
            if(e.key === "ArrowRight") keys.d = false;
        });

        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                if (keys.w) car.translateZ(-0.1);
                if (keys.s) car.translateZ(0.1);
                if (keys.a) car.rotation.y += 0.03;
                if (keys.d) car.rotation.y -= 0.03;

                // Camera car ke piche rahegi
                camera.lookAt(car.position);
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
