<!DOCTYPE html>
<html>
<head>
    <title>3D Car Game - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; } /* Sky Blue Background */
        #ui { position: absolute; top: 20px; left: 20px; font-family: sans-serif; color: white; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>3D Car Racing</h2>
        <p>Use ARROW KEYS to Drive</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Scene & Environment
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky color

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-10, 15, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Better colors
        renderer.toneMappingExposure = 2; 
        document.body.appendChild(renderer.domElement);

        // Lights (Isse color dikhenge)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(5, 10, 5);
        scene.add(sunLight);

        // Road/Environment
        const grid = new THREE.GridHelper(200, 50, 0xffffff, 0x555555);
        scene.add(grid);

        const roadGeo = new THREE.PlaneGeometry(200, 200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // 2. Car Loading & Movement Variables
        let car;
        let speed = 0;
        let turn = 0;
        const keys = {};

        const loader = new GLTFLoader();
        loader.load('scene.gltf', (gltf) => {
            car = gltf.scene;
            scene.add(car);
            
            // Model ko center aur scale karna
            car.scale.set(1, 1, 1); // Agar car bahut badi hai toh 0.1 kar dein
            car.position.set(0, 0, 0);
            
            console.log("Car loaded with textures!");
        });

        // Controls
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 3. Game Loop
        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                // Forward/Backward logic
                if (keys['ArrowUp']) speed += 0.01;
                if (keys['ArrowDown']) speed -= 0.01;
                
                // Steering logic
                if (keys['ArrowLeft']) turn += 0.01;
                if (keys['ArrowRight']) turn -= 0.01;

                // Physics (friction)
                speed *= 0.95;
                turn *= 0.9;

                car.translateZ(speed);
                car.rotation.y += turn * (speed * 0.5); // Speed ke hisaab se turn hoga

                // Camera follow car
                const relativeCameraOffset = new THREE.Vector3(0, 3, 8);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.x = cameraOffset.x;
                camera.position.y = cameraOffset.y;
                camera.position.z = cameraOffset.z;
                camera.lookAt(car.position);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
