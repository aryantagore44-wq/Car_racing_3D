<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON RACER 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;font-family:'Orbitron',monospace;touch-action:none;}
canvas#c{display:block;position:fixed;inset:0;}

/* LOADING */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;}
.load-title{font-size:clamp(28px,6vw,56px);font-weight:900;color:#0ff;letter-spacing:8px;text-shadow:0 0 30px #0ff,0 0 60px #0af;margin-bottom:8px;}
.load-sub{color:#0af;font-size:11px;letter-spacing:5px;margin-bottom:40px;opacity:0.7;}
#lb-wrap{width:min(340px,80vw);height:4px;background:rgba(0,255,255,0.15);border-radius:2px;overflow:hidden;}
#lb{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#0af);border-radius:2px;transition:width 0.3s;box-shadow:0 0 10px #0ff;}
#ls{color:rgba(0,255,255,0.5);font-size:10px;letter-spacing:3px;margin-top:14px;}

/* START SCREEN */
#overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:radial-gradient(ellipse at center,#050520 0%,#000 70%);}
.ov-title{font-size:clamp(36px,8vw,80px);font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;animation:hue 4s linear infinite;}
@keyframes hue{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
.ov-sub{color:rgba(0,255,255,0.6);font-size:clamp(9px,2vw,12px);letter-spacing:6px;margin-bottom:50px;}
#sbtn{padding:14px 50px;font-size:clamp(13px,3vw,16px);letter-spacing:5px;background:transparent;color:#0ff;border:1px solid #0ff;cursor:pointer;font-family:'Orbitron',monospace;font-weight:700;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:all 0.2s;position:relative;overflow:hidden;}
#sbtn::before{content:'';position:absolute;inset:0;background:#0ff;transform:scaleX(0);transform-origin:left;transition:transform 0.2s;z-index:-1;}
#sbtn:hover::before,#sbtn:active::before{transform:scaleX(1);}
#sbtn:hover,#sbtn:active{color:#000;}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 24px;margin-top:24px;color:rgba(255,255,255,0.35);font-size:clamp(9px,2vw,11px);letter-spacing:1px;}
.ck{color:#0ff;}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* Top bar */
#top-bar{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(180deg,rgba(0,0,0,0.9)0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.tb-item{text-align:center;}
.tb-label{font-size:8px;color:#0ff;letter-spacing:3px;opacity:0.7;}
.tb-val{font-size:clamp(14px,3vw,20px);font-weight:700;color:#fff;text-shadow:0 0 10px #0ff;}

/* Speed */
#speed-wrap{position:absolute;bottom:140px;right:16px;width:110px;height:110px;}

/* Gear */
#gear-box{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;}
#gear-val{font-size:48px;font-weight:900;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0af;line-height:1;}
.g-label{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.4);}

/* Drift bar */
#drift-wrap{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);width:min(220px,45vw);text-align:center;}
.d-label{font-size:8px;color:#f0f;letter-spacing:3px;margin-bottom:4px;opacity:0.8;}
#drift-bg{height:8px;background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.4);border-radius:4px;overflow:hidden;}
#drift-bar{height:100%;width:0%;background:linear-gradient(90deg,#f0f,#ff0);border-radius:4px;transition:width 0.08s;box-shadow:0 0 8px #f0f;}

/* Drift text */
#drift-txt{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:clamp(36px,8vw,64px);font-weight:900;background:linear-gradient(135deg,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:6px;opacity:0;transition:opacity 0.15s;text-align:center;white-space:nowrap;}

/* Nitro bar (vertical) */
#nitro-wrap{position:absolute;bottom:140px;left:16px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.n-label{font-size:7px;color:#0ff;letter-spacing:2px;}
#nitro-bg{width:12px;height:90px;background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.4);border-radius:6px;overflow:hidden;position:relative;}
#nitro-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(180deg,#0ff,#04f);border-radius:6px;transition:height 0.1s;box-shadow:0 0 8px #0ff;}

/* Minimap */
#minimap{position:absolute;top:60px;right:16px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,255,255,0.4);box-shadow:0 0 15px rgba(0,255,255,0.2);}
#mm-canvas{width:100%;height:100%;}

/* Position */
#pos-badge{position:absolute;top:60px;left:16px;text-align:center;}
.pos-label{font-size:8px;color:#ff0;letter-spacing:2px;}
#pos-val{font-size:36px;font-weight:900;color:#ff0;text-shadow:0 0 15px #ff0;line-height:1;}

/* ====== MOBILE CONTROLS ====== */
#mobile-controls{position:fixed;bottom:0;left:0;right:0;height:170px;z-index:20;pointer-events:none;}

/* Left side: steering */
#steer-zone{position:absolute;bottom:20px;left:16px;display:flex;gap:10px;pointer-events:all;}
/* Right side: gas/brake */
#accel-zone{position:absolute;bottom:20px;right:16px;display:flex;gap:10px;pointer-events:all;}
/* Bottom center: drift + nitro */
#action-zone{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;pointer-events:all;}

.btn-ctrl{
  width:62px;height:62px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-family:'Orbitron',monospace;font-weight:700;
  border:2px solid;cursor:pointer;user-select:none;
  -webkit-user-select:none;touch-action:none;
  transition:transform 0.08s,box-shadow 0.08s;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
}
.btn-ctrl:active,.btn-ctrl.pressed{transform:scale(0.88);filter:brightness(1.4);}

.btn-left{border-color:#0ff;color:#0ff;box-shadow:0 0 12px rgba(0,255,255,0.3);}
.btn-right{border-color:#0ff;color:#0ff;box-shadow:0 0 12px rgba(0,255,255,0.3);}
.btn-gas{border-color:#0f0;color:#0f0;box-shadow:0 0 12px rgba(0,255,0,0.3);width:72px;height:72px;}
.btn-brake{border-color:#f00;color:#f00;box-shadow:0 0 12px rgba(255,0,0,0.3);}
.btn-drift{border-color:#f0f;color:#f0f;box-shadow:0 0 12px rgba(255,0,255,0.3);font-size:10px;letter-spacing:1px;}
.btn-nitro{border-color:#ff0;color:#ff0;box-shadow:0 0 12px rgba(255,255,0,0.3);font-size:10px;letter-spacing:1px;}

/* hide mobile controls on desktop */
@media(hover:hover) and (pointer:fine){
  #mobile-controls{display:none;}
  #gear-box{bottom:140px;}
  #drift-wrap{bottom:175px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- LOADING -->
<div id="loading">
  <div class="load-title">NEON RACER</div>
  <div class="load-sub">3D DRIFT CHAMPIONSHIP</div>
  <div id="lb-wrap"><div id="lb"></div></div>
  <div id="ls">Initializing engine...</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div class="tb-item"><div class="tb-label">SCORE</div><div class="tb-val" id="h-score">0</div></div>
    <div class="tb-item"><div class="tb-label">LAP TIME</div><div class="tb-val" id="h-time">00:00.00</div></div>
    <div class="tb-item"><div class="tb-label">LAP</div><div class="tb-val" id="h-lap">1/3</div></div>
  </div>
  <canvas id="mm-canvas" width="110" height="110" id="mmcan" style="position:absolute;top:60px;right:16px;width:110px;height:110px;border-radius:50%;border:1px solid rgba(0,255,255,0.5);box-shadow:0 0 15px rgba(0,255,255,0.25);"></canvas>
  <div id="pos-badge"><div class="pos-label">PLACE</div><div id="pos-val">P1</div></div>
  <canvas id="speed-wrap" width="110" height="110" style="position:absolute;bottom:130px;right:16px;"></canvas>
  <div id="gear-box"><div id="gear-val">N</div><div class="g-label">GEAR</div></div>
  <div id="drift-wrap"><div class="d-label">DRIFT</div><div id="drift-bg"><div id="drift-bar"></div></div></div>
  <div id="drift-txt">DRIFT!</div>
  <div id="nitro-wrap"><div class="n-label">NOS</div><div id="nitro-bg"><div id="nitro-fill" style="height:100%;"></div></div></div>
</div>

<!-- MOBILE CONTROLS -->
<div id="mobile-controls">
  <div id="steer-zone">
    <div class="btn-ctrl btn-left" id="btn-l">&#9664;</div>
    <div class="btn-ctrl btn-right" id="btn-r">&#9654;</div>
  </div>
  <div id="action-zone">
    <div class="btn-ctrl btn-drift" id="btn-d">DRIFT</div>
    <div class="btn-ctrl btn-nitro" id="btn-n">NOS</div>
  </div>
  <div id="accel-zone">
    <div class="btn-ctrl btn-brake" id="btn-b">&#9660;</div>
    <div class="btn-ctrl btn-gas" id="btn-g">&#9650;</div>
  </div>
</div>

<!-- START SCREEN -->
<div id="overlay">
  <div class="ov-title">NEON RACER</div>
  <div class="ov-sub">EXTREME DRIFT CHAMPIONSHIP</div>
  <button id="sbtn" onclick="startGame()">START RACE</button>
  <div class="ctrl-grid">
    <div><span class="ck">W / UP</span> Accelerate</div>
    <div><span class="ck">S / DOWN</span> Brake</div>
    <div><span class="ck">A / D</span> Steer</div>
    <div><span class="ck">SPACE</span> Drift</div>
    <div><span class="ck">SHIFT</span> Nitro</div>
    <div><span class="ck">R</span> Reset</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// RENDERER
// ============================================================
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000510);
scene.fog = new THREE.Fog(0x000510, 120, 380);

var camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.5, 450);

window.addEventListener('resize', function(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ============================================================
// LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0x112244, 3.0));

var sun = new THREE.DirectionalLight(0x8888ff, 1.4);
sun.position.set(60, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 450;
sun.shadow.camera.left = -180;
sun.shadow.camera.right = 180;
sun.shadow.camera.top = 180;
sun.shadow.camera.bottom = -180;
scene.add(sun);

// Neon colored fill lights (just 4, no per-object lights)
var neonColors = [0x00ffff, 0xff00ff, 0x00ff88, 0xff8800];
var neonPos = [[180,0],[0,110],[-180,0],[0,-110]];
for(var ni=0; ni<4; ni++){
  var nl = new THREE.PointLight(neonColors[ni], 2.0, 160);
  nl.position.set(neonPos[ni][0], 12, neonPos[ni][1]);
  scene.add(nl);
}

// ============================================================
// TRACK
// ============================================================
var TX=200, TZ=120, TW=18, TSEGS=90;

function trackPt(t){
  var a = t * Math.PI * 2;
  return new THREE.Vector3(Math.cos(a)*TX, 0, Math.sin(a)*TZ);
}
function trackTan(t){
  var e=0.001;
  var p0=trackPt(t-e), p1=trackPt(t+e);
  return p1.sub(p0).normalize();
}

// Cache 200 track points for fast lookup
var TCACHE=[];
for(var ci=0;ci<200;ci++) TCACHE.push(trackPt(ci/200));

// GROUND - simple gradient plane
var gndMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(700, 700, 1, 1),
  new THREE.MeshLambertMaterial({color:0x040818})
);
gndMesh.rotation.x = -Math.PI/2;
gndMesh.receiveShadow = true;
scene.add(gndMesh);

// ROAD oval
(function(){
  var op=[], ip=[];
  for(var i=0;i<=TSEGS;i++){
    var a=(i/TSEGS)*Math.PI*2;
    op.push(new THREE.Vector2(Math.cos(a)*(TX+TW), Math.sin(a)*(TZ+TW)));
    ip.push(new THREE.Vector2(Math.cos(a)*(TX-TW), Math.sin(a)*(TZ-TW)));
  }
  var shape = new THREE.Shape(op);
  shape.holes.push(new THREE.Path(ip));
  var road = new THREE.Mesh(
    new THREE.ShapeGeometry(shape, 2),
    new THREE.MeshLambertMaterial({color:0x0a0a1a})
  );
  road.rotation.x = -Math.PI/2;
  road.position.y = 0.02;
  scene.add(road);
})();

// NEON road edge lines (emissive glow effect - no extra lights!)
function makeGlowLine(radiusX, radiusZ, color){
  var pts=[];
  for(var i=0;i<=120;i++){
    var a=(i/120)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*radiusX, 0.05, Math.sin(a)*radiusZ));
  }
  var geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({color:color})));
}
makeGlowLine(TX+TW, TZ+TW, 0x00ffff);
makeGlowLine(TX-TW, TZ-TW, 0xff00ff);
makeGlowLine(TX, TZ, 0xffff00);   // center line

// KERBS
for(var side=-1;side<=1;side+=2){
  var r=side===1?TX+TW:TX-TW, rz=side===1?TZ+TW:TZ-TW;
  for(var ki=0;ki<TSEGS;ki++){
    var a=(ki/TSEGS)*Math.PI*2, a1=((ki+1)/TSEGS)*Math.PI*2;
    var kcolor=ki%2===0?0xff0000:0xffffff;
    var kshape=new THREE.Shape([
      new THREE.Vector2(Math.cos(a)*r, Math.sin(a)*rz),
      new THREE.Vector2(Math.cos(a1)*r, Math.sin(a1)*rz),
      new THREE.Vector2(Math.cos(a1)*(r*0.98), Math.sin(a1)*(rz*0.98)),
      new THREE.Vector2(Math.cos(a)*(r*0.98), Math.sin(a)*(rz*0.98))
    ]);
    var km=new THREE.Mesh(new THREE.ShapeGeometry(kshape,1),
      new THREE.MeshLambertMaterial({color:kcolor}));
    km.rotation.x=-Math.PI/2; km.position.y=0.03; scene.add(km);
  }
}

// START/FINISH
for(var sfi=0;sfi<10;sfi++) for(var sfj=0;sfj<2;sfj++){
  var sfm=new THREE.Mesh(new THREE.PlaneGeometry(TW*2/10, 2),
    new THREE.MeshLambertMaterial({color:(sfi+sfj)%2===0?0xffffff:0x000000}));
  sfm.rotation.x=-Math.PI/2;
  sfm.position.set(TX-TW+(sfi+0.5)*(TW*2/10), 0.05, -1+sfj*2);
  scene.add(sfm);
}

// GUARDRAILS
for(var gs=-1;gs<=1;gs+=2){
  var gr=gs===1?TX+TW+2:TX-TW-2, grz=gs===1?TZ+TW+2:TZ-TW-2;
  var gpts=[];
  for(var gi=0;gi<=TSEGS;gi++){
    var ga=(gi/TSEGS)*Math.PI*2;
    gpts.push(new THREE.Vector3(Math.cos(ga)*gr, 0.5, Math.sin(ga)*grz));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(gpts),
    new THREE.LineBasicMaterial({color:gs===1?0x00ffff:0xff00ff})
  ));
}

// NEON PILLARS along track (cheap glow: just emissive boxes)
for(var pi=0;pi<TSEGS;pi+=6){
  var pa=(pi/TSEGS)*Math.PI*2;
  var px=Math.cos(pa)*(TX+TW+5), pz=Math.sin(pa)*(TZ+TW+5);
  var pillar=new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 0.3),
    new THREE.MeshBasicMaterial({color:0x00ffff}));
  pillar.position.set(px, 4, pz); scene.add(pillar);
  // Top glow cube
  var glw=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7),
    new THREE.MeshBasicMaterial({color:pi%12===0?0xff00ff:0x00ffff}));
  glw.position.set(px, 8.3, pz); scene.add(glw);
}

// GRANDSTANDS (simple, no shadows)
function addStand(x,z,angle){
  var g=new THREE.Group();
  var W=26, D=9;
  var base=new THREE.Mesh(new THREE.BoxGeometry(W,0.4,D),
    new THREE.MeshLambertMaterial({color:0x111122}));
  base.position.y=0.2; g.add(base);
  for(var row=0;row<5;row++){
    var seat=new THREE.Mesh(new THREE.BoxGeometry(W,0.2,1.2),
      new THREE.MeshLambertMaterial({color:row%2===0?0x220044:0x002244}));
    seat.position.set(0, 0.4+row*1.0, -D/2+0.6+row*1.1); g.add(seat);
    // Neon strip on seat edge
    var strip=new THREE.Mesh(new THREE.BoxGeometry(W,0.1,0.1),
      new THREE.MeshBasicMaterial({color:row%2===0?0xff00ff:0x00ffff}));
    strip.position.set(0, 0.5+row*1.0, -D/2+1.15+row*1.1); g.add(strip);
  }
  var roof=new THREE.Mesh(new THREE.BoxGeometry(W+1,0.3,D+1),
    new THREE.MeshLambertMaterial({color:0x0a0a22}));
  roof.position.y=7; g.add(roof);
  // Roof neon
  var rstrip=new THREE.Mesh(new THREE.BoxGeometry(W,0.08,0.08),
    new THREE.MeshBasicMaterial({color:0x00ffff}));
  rstrip.position.set(0,7.2,-D/2); g.add(rstrip);
  g.position.set(x,0,z); g.rotation.y=angle;
  scene.add(g);
}
addStand(0, -(TZ+44), 0);
addStand(0,  TZ+44, Math.PI);
addStand(-(TX+48), 0, Math.PI/2);
addStand( TX+48, 0, -Math.PI/2);

// NEON BILLBOARDS
function addBillboard(x,z,angle,col){
  var g=new THREE.Group();
  var frame=new THREE.Mesh(new THREE.BoxGeometry(12,5,0.4),
    new THREE.MeshBasicMaterial({color:col}));
  frame.position.y=12; g.add(frame);
  [-2.5,2.5].forEach(function(px){
    var p=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,11,5),
      new THREE.MeshLambertMaterial({color:0x222233}));
    p.position.set(px,5.5,0); g.add(p);
  });
  g.position.set(x,0,z); g.rotation.y=angle;
  scene.add(g);
}
addBillboard(-80, -(TZ+55), 0, 0xff0055);
addBillboard( 80, -(TZ+55), 0, 0xffaa00);
addBillboard(-80,  TZ+55, Math.PI, 0x00ff88);
addBillboard( 80,  TZ+55, Math.PI, 0x0088ff);

// TIRE STACKS
function addTires(x,z){
  for(var tr=0;tr<2;tr++) for(var tc=0;tc<3;tc++){
    var t=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.24,5,10),
      new THREE.MeshLambertMaterial({color:0x111111}));
    t.rotation.x=Math.PI/2;
    t.position.set(x+tc*1.3-1.3, 0.6+tr*1.2, z);
    scene.add(t);
  }
}
[[TX+TW+8,28],[TX+TW+8,-28],[-(TX+TW+8),28],[-(TX+TW+8),-28]].forEach(function(v){addTires(v[0],v[1]);});

// TREES (neon style)
for(var ti=0;ti<35;ti++){
  var ta=(ti/35)*Math.PI*2;
  var tr2=TX+TW+20+Math.random()*35;
  var tx=Math.cos(ta)*tr2, tz=Math.sin(ta)*tr2;
  var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,3.5,5),
    new THREE.MeshLambertMaterial({color:0x0a1a0a}));
  trunk.position.set(tx,1.75,tz); scene.add(trunk);
  var canopy=new THREE.Mesh(new THREE.SphereGeometry(1.8+Math.random(),5,5),
    new THREE.MeshLambertMaterial({color:new THREE.Color(0,0.15+Math.random()*0.1,0.1+Math.random()*0.1)}));
  canopy.position.set(tx, 5.2+Math.random()*0.5, tz); scene.add(canopy);
  // Neon outline dot on top
  var dot=new THREE.Mesh(new THREE.SphereGeometry(0.2,4,4),
    new THREE.MeshBasicMaterial({color:ti%3===0?0x00ffff:ti%3===1?0xff00ff:0x00ff88}));
  dot.position.set(tx, 7, tz); scene.add(dot);
}

// CITY SKYLINE in background (silhouette)
for(var bi=0;bi<30;bi++){
  var ba=(bi/30)*Math.PI*2;
  var br=TX+TW+100+Math.random()*60;
  var bh=10+Math.random()*30;
  var bw=5+Math.random()*10;
  var bld=new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bw),
    new THREE.MeshLambertMaterial({color:0x050514}));
  bld.position.set(Math.cos(ba)*br, bh/2, Math.sin(ba)*br);
  scene.add(bld);
  // Window neons
  for(var wi=0;wi<3;wi++){
    var wm=new THREE.Mesh(new THREE.BoxGeometry(bw*0.8, 0.15, 0.1),

var NPC_COLORS=[0x0088ff, 0x00ee44, 0xff8800, 0xcc00ff, 0xff0055];

function buildCar(color, isPlayer){
  var g=new THREE.Group();
  var bodyMat=isPlayer
    ? new THREE.MeshStandardMaterial({color:color, roughness:0.15, metalness:0.9, emissive:color, emissiveIntensity:0.05})
    : new THREE.MeshLambertMaterial({color:color, emissive:color, emissiveIntensity:0.08});
  var body=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.65,4.6), bodyMat);
  body.position.y=0.72;
  if(isPlayer) body.castShadow=true;
  g.add(body);

  var cabinMat=new THREE.MeshLambertMaterial({color:0x001133, emissive:0x002266, emissiveIntensity:0.5});
  var cabin=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.68,2.2), cabinMat);
  cabin.position.set(0,1.3,0.15); g.add(cabin);

  // Neon underglow (emissive strip)
  var glow=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.05,4.2),
    new THREE.MeshBasicMaterial({color:color}));
  glow.position.set(0,0.4,0); g.add(glow);

  // Spoiler
  var sp=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.1,0.5),
    new THREE.MeshLambertMaterial({color:0x111111}));
  sp.position.set(0,1.48,-2.0); g.add(sp);

  // Wheels
  var wm=new THREE.MeshLambertMaterial({color:0x111111});
  var rm=new THREE.MeshLambertMaterial({color:0x888888, emissive:color, emissiveIntensity:0.3});
  var wpos=[[1.2,0.38,1.55],[-1.2,0.38,1.55],[1.2,0.38,-1.55],[-1.2,0.38,-1.55]];
  var wheels=[];
  wpos.forEach(function(wp){
    var wg=new THREE.Group();
    var tire=new THREE.Mesh(new THREE.CylinderGeometry(0.38,0.38,0.38,12), wm);
    tire.rotation.z=Math.PI/2; wg.add(tire);
    var rim=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.4,5), rm);
    rim.rotation.z=Math.PI/2; wg.add(rim);
    wg.position.set(wp[0],wp[1],wp[2]);
    g.add(wg); wheels.push(wg);
  });

  // Tail lights
  var tlm=new THREE.MeshBasicMaterial({color:0xff0000});
  [-0.75,0.75].forEach(function(x){
    var tl=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.12,0.06),tlm);
    tl.position.set(x,0.8,-2.34); g.add(tl);
  });

  var flames=[];
  if(isPlayer){
    // Headlights
    var hlm=new THREE.MeshBasicMaterial({color:0xffffff});
    [-0.7,0.7].forEach(function(x){
      var hl=new THREE.Mesh(new THREE.SphereGeometry(0.16,7,7),hlm);
      hl.position.set(x,0.75,2.34); g.add(hl);
    });
    // Exhaust flames
    [-0.5,0.5].forEach(function(x){
      var f=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.9,6),
        new THREE.MeshBasicMaterial({color:0x00ffff, transparent:true, opacity:0.9}));
      f.rotation.x=Math.PI;
      f.position.set(x,0.62,-2.62);
      f.visible=false; g.add(f); flames.push(f);
    });
  }
  return {group:g, wheels:wheels, flames:flames};
}

function bindBtn(id, prop){

  function off(e){ e.preventDefault(); touch[prop]=false; el.classList.remove('pressed'); }
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}

function isLeft(){ return keys['KeyA']||keys['ArrowLeft']||touch.left; }
function isRight(){ return keys['KeyD']||keys['ArrowRight']||touch.right; }
function isGas(){ return keys['KeyW']||keys['ArrowUp']||touch.gas; }
function isBrake(){ return keys['KeyS']||keys['ArrowDown']||touch.brake; }
function isDriftKey(){ return keys['Space']||touch.drift; }
function isNitro(){ return keys['ShiftLeft']||keys['ShiftRight']||touch.nitro; }

// ============================================================
// PHYSICS
// ============================================================
var ACCEL=28, BRAKE=44, MAX_S=46, STEER=2.1;

function getTrackT(pos){
  var best=0, bd=1e9;
  for(var i=0;i<200;i++){
    var d=pos.distanceTo(TCACHE[i]);
    if(d<bd){bd=d;best=i/200;}
  }
  return best;
}

var gameStarted=false;
function startGame(){
  document.getElementById('overlay').style.display='none';
  PS.lapStart=performance.now();
  gameStarted=true;
}

function updatePlayer(dt){
  if(!gameStarted) return;
  var s=PS;
  var boost=(s.nitroOn&&s.nitro>0)?1.65:1;
  var accel=0, steer=0;
  if(isGas()) accel=1;
  if(isBrake()) accel=-0.65;
  if(isLeft()) steer=1;
  if(isRight()) steer=-1;
  s.nitroOn=isNitro()&&s.nitro>0;
  var drifting=isDriftKey()&&Math.abs(s.speed)>6;

  // Nitro
  if(s.nitroOn&&s.nitro>0){
    s.nitro=Math.max(0,s.nitro-dt*22);
    if(playerCar) playerCar.flames.forEach(function(f){f.visible=true;f.scale.y=0.5+Math.random()*1.2;});
  } else {
    if(playerCar) playerCar.flames.forEach(function(f){f.visible=false;});
    if(!s.nitroOn) s.nitro=Math.min(100,s.nitro+dt*9);
  }

  // Speed
  var ms=MAX_S*boost*(drifting?0.85:1);
  if(accel>0) s.speed=Math.min(s.speed+ACCEL*boost*dt,ms);
  else if(accel<0) s.speed=Math.max(s.speed-BRAKE*dt,-MAX_S*0.4);
  else s.speed*=0.976;

  s.gear=s.speed<0?-1:s.speed<10?1:s.speed<22?2:s.speed<34?3:4;

  // Steer
  var sa=STEER*(drifting?1.9:1)*Math.min(1,Math.abs(s.speed)/10)*dt;
  s.angVel+=steer*sa*Math.sign(s.speed||1);
  s.angVel*=0.67;
  s.angle+=s.angVel;

  // Drift
  if(drifting&&Math.abs(s.speed)>6){
    s.driftAngle+=(steer*0.028-s.driftAngle*0.12);
    s.isDrift=true;
    s.driftMeter=Math.min(100,s.driftMeter+dt*55);
    s.driftScore+=Math.abs(s.speed)*dt*2.8;
    if(Math.random()<0.35&&playerCar){
      var wp=new THREE.Vector3();
      playerCar.group.getWorldPosition(wp);
      spawnSmoke(new THREE.Vector3(wp.x+1.1, wp.y, wp.z-1.6));
      spawnSmoke(new THREE.Vector3(wp.x-1.1, wp.y, wp.z-1.6));
    }
  } else {
    s.driftAngle*=0.82;
    if(s.isDrift&&s.driftScore>5){ s.totalScore+=Math.floor(s.driftScore); s.driftScore=0; }
    s.isDrift=false;
    s.driftMeter*=0.96;
  }

  // Move
  var dirX=Math.sin(s.angle+s.driftAngle);
  var dirZ=Math.cos(s.angle+s.driftAngle);
  var latX=Math.sin(s.angle+Math.PI/2);
  var latZ=Math.cos(s.angle+Math.PI/2);
  s.pos.x+=dirX*s.speed*dt + latX*s.speed*s.driftAngle*0.55*dt;
  s.pos.z+=dirZ*s.speed*dt + latZ*s.speed*s.driftAngle*0.55*dt;
  s.pos.y=0.38;

  // Lap
  var newT=getTrackT(s.pos);
  if(s.lastT>0.85&&newT<0.15&&s.speed>3&&(performance.now()-s.lapStart)>8000){
    s.lap=Math.min(s.lap+1,3);
    s.lapStart=performance.now();
    s.totalScore+=800;
  }
  s.trackT=newT; s.lastT=newT;

  // Reset
  if(keys['KeyR']){
    var rp=trackPt(0);
    s.pos.set(rp.x,0.38,rp.z+4);
    s.speed=0; s.angle=Math.PI/2; s.driftAngle=0; s.angVel=0;
  }

  // Apply
  if(playerCar){
    playerCar.group.position.copy(s.pos);
    playerCar.group.rotation.y=s.angle+s.driftAngle;
    var spin=s.speed*dt*3;
    playerCar.wheels.forEach(function(w,i){
      w.children[0].rotation.x+=spin;
      if(i<2) w.rotation.y=steer*0.38;
    });
  }
}

function updateNPCs(dt){
  NPCS.forEach(function(npc){
    npc.wobble+=dt*0.85;
    npc.t=(npc.t+dt*(npc.speed/1700))%1;
    var p=trackPt(npc.t);
    var tan=trackTan(npc.t);
    var px=tan.z, pz=-tan.x;
    var lane=npc.lane+Math.sin(npc.wobble)*1.2;
    if(npc.mesh){
      npc.mesh.position.set(p.x+px*lane, 0.38, p.z+pz*lane);
      npc.mesh.rotation.y=Math.atan2(tan.x,tan.z);
      npc.wheels.forEach(function(w){ w.children[0].rotation.x+=npc.speed*dt*0.25; });
    }
  });
  // Position
  var all=[{s:PS.trackT+PS.lap*10, p:true}];
  NPCS.forEach(function(n){ all.push({s:n.t+10, p:false}); });
  all.sort(function(a,b){return b.s-a.s;});
  PS.position=all.findIndex(function(x){return x.p;})+1;
}

function updateSmoke(dt){
  SMOKE.forEach(function(p){
    if(!p.mesh.visible) return;
    p.life+=dt;
    if(p.life>p.max){p.mesh.visible=false;return;}
    var t=p.life/p.max;
    p.mesh.position.x+=p.vel.x*dt;
    p.mesh.position.y+=p.vel.y*dt;
    p.mesh.position.z+=p.vel.z*dt;
    p.vel.y+=0.6*dt;
    p.mesh.material.opacity=0.4*(1-t);
    p.mesh.scale.setScalar(1+t*3);
  });
}

var mmC=document.getElementById('mm-canvas');
var mmX=mmC.getContext('2d');
var MMS=0.25;
function drawMinimap(){
  var W=110, H=110;
  mmX.clearRect(0,0,W,H);
  mmX.fillStyle='rgba(0,5,16,0.9)';
  mmX.beginPath(); mmX.arc(W/2,H/2,W/2,0,Math.PI*2); mmX.fill();
  // Track oval
  mmX.strokeStyle='rgba(0,255,255,0.4)'; mmX.lineWidth=7;
  mmX.beginPath();
  for(var i=0;i<=80;i++){
    var p=trackPt(i/80);
    var mx=W/2+p.x*MMS, my=H/2+p.z*MMS;
    i===0?mmX.moveTo(mx,my):mmX.lineTo(mx,my);
  }
  mmX.closePath(); mmX.stroke();
  // NPCs
  NPCS.forEach(function(n,i){
    if(!n.mesh) return;
    mmX.fillStyle=['#0088ff','#00ee44','#ff8800','#cc00ff','#ff0055'][i];
    mmX.beginPath();
    mmX.arc(W/2+n.mesh.position.x*MMS, H/2+n.mesh.position.z*MMS, 3,0,Math.PI*2);
    mmX.fill();
  });
  // Player
  var cx=W/2+PS.pos.x*MMS, cy=H/2+PS.pos.z*MMS;
  mmX.fillStyle='#00ffff';
  mmX.beginPath(); mmX.arc(cx,cy,4.5,0,Math.PI*2); mmX.fill();
  mmX.strokeStyle='#00ffff'; mmX.lineWidth=1.5; mmX.beginPath(); mmX.moveTo(cx,cy);
  mmX.lineTo(cx+Math.sin(PS.angle)*8, cy+Math.cos(PS.angle)*8); mmX.stroke();
  // Border
  mmX.strokeStyle='rgba(0,255,255,0.6)'; mmX.lineWidth=1.5;
  mmX.beginPath(); mmX.arc(W/2,H/2,W/2-1,0,Math.PI*2); mmX.stroke();
}

// SPEEDOMETER
// ============================================================
var spC=document.getElementById('speed-wrap');
var spX=spC.getContext('2d');
function drawSpeedo(){
  var spd=Math.abs(PS.speed)*3.6*0.8, mx=180;
  var W=110,H=110;
  spX.clearRect(0,0,W,H);
  spX.fillStyle='rgba(0,5,20,0.8)';
  spX.beginPath(); spX.arc(W/2,H/2,W/2,0,Math.PI*2); spX.fill();
  // Border
  spX.strokeStyle='rgba(0,255,255,0.5)'; spX.lineWidth=1.5;
  spX.beginPath(); spX.arc(W/2,H/2,W/2-1,0,Math.PI*2); spX.stroke();
  // Ticks
  for(var i=0;i<=10;i++){
    var a2=-Math.PI*0.75+i*(Math.PI*1.5/10);
    spX.strokeStyle=i%5===0?'#00ffff':'#334455'; spX.lineWidth=i%5===0?2:1;
    var r1=46, r2=i%5===0?36:41;
    spX.beginPath();
    spX.moveTo(W/2+Math.cos(a2)*r1, H/2+Math.sin(a2)*r1);
    spX.lineTo(W/2+Math.cos(a2)*r2, H/2+Math.sin(a2)*r2);
    spX.stroke();
  }
  // Arc
  var ang=-Math.PI*0.75+(spd/mx)*Math.PI*1.5;
  var g2=spX.createLinearGradient(10,H/2,100,H/2);
  g2.addColorStop(0,'#00ffff'); g2.addColorStop(1,'#ff00ff');
  spX.strokeStyle=g2; spX.lineWidth=5;
  spX.beginPath(); spX.arc(W/2,H/2,40,-Math.PI*0.75,ang); spX.stroke();
  // Needle
  spX.strokeStyle='#ffffff'; spX.lineWidth=1.5;
  spX.beginPath(); spX.moveTo(W/2,H/2);
  spX.lineTo(W/2+Math.cos(ang)*33, H/2+Math.sin(ang)*33); spX.stroke();
  spX.fillStyle='#00ffff';
  spX.beginPath(); spX.arc(W/2,H/2,4,0,Math.PI*2); spX.fill();
  // Text
  spX.fillStyle='#ffffff'; spX.font='bold 15px Orbitron,monospace'; spX.textAlign='center';
  spX.fillText(Math.round(spd), W/2, H/2+12);
  spX.font='7px Orbitron,monospace'; spX.fillStyle='#00ffff';
  spX.fillText('KM/H', W/2, H/2+22);
}

function setLoad(pct,msg){

function loadScript(src,cb){
  var s=document.createElement('script'); s.src=src; s.onload=cb; document.head.appendChild(s);

function onCarLoaded(model){
  var box=new THREE.Box3().setFromObject(model);
  var size=new THREE.Vector3(); box.getSize(size);
  var sc=4/Math.max(size.x,size.y,size.z);
  model.scale.setScalar(sc);
  var box2=new THREE.Box3().setFromObject(model);
  model.position.y=-box2.min.y;
  model.traverse(function(m){
    if(m.isMesh){
      m.castShadow=true;
      // Add neon emissive to car materials
      if(m.material){
        try{ m.material.emissive=new THREE.Color(0x002244); m.material.emissiveIntensity=0.3; } catch(e){}
      }
    }
  });
  var group=new THREE.Group(); group.add(model);
  var flames=[];
  [-0.45,0.45].forEach(function(x){
    var f=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.9,6),
      new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.9}));
    f.rotation.x=Math.PI; f.position.set(x,0.5,-2.4); f.visible=false;
    group.add(f); flames.push(f);
  });
  var wheels=[];
  model.traverse(function(m){
    if(m.name&&/wheel|tire|rim/i.test(m.name)) wheels.push(m);
  });
  playerCar={group:group, wheels:wheels, flames:flames};
  scene.add(group);
  group.position.copy(PS.pos);
  group.rotation.y=PS.angle;
}

function setupNPCs(){
  NPCS.forEach(function(npc,i){
    var cd=buildCar(NPC_COLORS[i],false);
    scene.add(cd.group); npc.mesh=cd.group; npc.wheels=cd.wheels;
    var p=trackPt(npc.t);
    cd.group.position.set(p.x, 0.38, p.z+npc.lane);
  });
}

function showStart(){
  document.getElementById('loading').style.display='none';
  document.getElementById('overlay').style.display='flex';
}

function init(){
  setLoad(10,'Loading Three.js extras...');
  loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js', function(){
    setLoad(30,'Loading your car model...');
    var loader=new THREE.GLTFLoader();
    loader.load('scene.gltf',
      function(gltf){
        setLoad(80,'Building scene...');
        onCarLoaded(gltf.scene);
        setupNPCs();
        setLoad(100,'Ready!');
        setTimeout(showStart, 400);
      },
      function(xhr){
        if(xhr.total>0) setLoad(30+Math.round(xhr.loaded/xhr.total*45),'Loading model '+Math.round(xhr.loaded/xhr.total*100)+'%...');
      },
      function(err){
        console.warn('GLTF failed, using built-in car:', err);
        var pd=buildCar(0x00ffff, true);
        playerCar=pd; scene.add(pd.group);
        pd.group.position.copy(PS.pos);
        pd.group.rotation.y=PS.angle;
        setupNPCs();
        setLoad(100,'Ready!');
        setTimeout(showStart, 400);
      }
    );
  });
}

var lastT=0;
function animate(t){
  requestAnimationFrame(animate);
  var dt=Math.min((t-lastT)/1000, 0.05); lastT=t;
  if(gameStarted){
    updatePlayer(dt);
    updateNPCs(dt);
    updateSmoke(dt);
    updateCamera();
    hudTick++;
    if(hudTick%3===0){
      updateHUD(); drawMinimap(); drawSpeedo();
    }
  }
  renderer.render(scene,camera);
}

init(); animate(0);
</script>
</body>
